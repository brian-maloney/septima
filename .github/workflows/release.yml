name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            goos: darwin
            goarch: arm64
          - os: ubuntu-latest
            goos: linux
            goarch: x64
          - os: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
          - os: windows-latest
            goos: windows
            goarch: x64
            ext: .exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: Fetch ONNX Runtime library
        shell: bash
        run: scripts/fetch-ortlib.sh

      - name: Fetch model weights
        shell: bash
        run: scripts/fetch-models.sh

      - name: Build septima (self-contained, embedded models + ONNX Runtime)
        shell: bash
        run: |
          ldflags="-X github.com/brian-maloney/septima.Version=${GITHUB_REF_NAME}"
          go build -ldflags "$ldflags" -o "septima-${GITHUB_REF_NAME}-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}" ./cmd/septima

      - uses: actions/upload-artifact@v7
        with:
          name: septima-${{ matrix.goos }}-${{ matrix.goarch }}
          path: septima-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

      - name: Build septima-bench
        shell: bash
        run: |
          mkdir -p dist
          ldflags="-X github.com/brian-maloney/septima.Version=${GITHUB_REF_NAME}"
          go build -ldflags "$ldflags" -o "dist/septima-bench${{ matrix.ext }}" ./cmd/septima-bench

      - name: Package septima-bench archive
        shell: bash
        run: |
          mkdir -p dist/models
          cp internal/ortlib/lib/* dist/models/
          cp models/*.onnx models/classes.json dist/models/
          cp README.md LICENSE dist/
          archive="septima-bench-${GITHUB_REF_NAME}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz"
          tar czf "$archive" -C dist .
          echo "ARCHIVE=$archive" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v7
        with:
          name: septima-bench-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ env.ARCHIVE }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Restore executable bit
        shell: bash
        # Bare (non-tarball) binaries can lose their executable bit across the
        # upload-artifact/download-artifact round-trip; tarballs are unaffected.
        run: find artifacts -type f -name 'septima-*' ! -name '*.tar.gz' -exec chmod +x {} +

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            artifacts/*/*.tar.gz
            artifacts/*/septima-*
          generate_release_notes: true
