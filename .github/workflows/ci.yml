name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Fetch ONNX Runtime library
        id: ortlib
        run: echo "path=$(scripts/fetch-ortlib.sh)" >> "$GITHUB_OUTPUT"

      - name: Fetch model weights
        run: scripts/fetch-models.sh

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...
        env:
          SEPTIMA_ORT_LIB: ${{ steps.ortlib.outputs.path }}
